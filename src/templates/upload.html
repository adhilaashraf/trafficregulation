<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic Monitoring - Upload Video</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('/static/images/222.jpg') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            text-align: center;
            color: white;
            position: relative;
        }

        h1 {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            position: absolute;
            top: 20px; /* Position at the top */
            left: 50%;
            transform: translateX(-50%); /* Center it horizontally */
            margin: 0;
        }

        .container {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.2);
            width: 400px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            background-color: #f44336;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.3s;
            display: inline-block;
        }

        .custom-file-upload:hover {
            background-color: #d32f2f;
        }

        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #388E3C;
        }
    </style>
</head>
<body>
    <h1>Smart Traffic Monitoring</h1> <!-- Title centered at the top -->

    <div class="container">
        <form action="/upload" method="post" enctype="multipart/form-data">
            <label for="file-upload" class="custom-file-upload">Choose File</label>
            <input id="file-upload" type="file" name="video" required>
            <br>
            <button type="submit">Upload</button>
        </form>
    </div>
</body>
</html>
